<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COLLYWOOD Admin</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0e12;color:#f5f3ec;padding:20px}
.container{max-width:1100px;margin:0 auto}
header{display:flex;justify-content:space-between;align-items:center;margin-bottom:26px;padding-bottom:16px;border-bottom:1px solid rgba(246,243,236,.1)}
h1{font-size:1.5rem}
button{cursor:pointer;font-family:inherit}
.logout-btn{background:rgba(246,243,236,.1);border:none;color:#f5f3ec;padding:8px 16px;border-radius:6px}
.tabs{display:flex;gap:10px;margin-bottom:20px;border-bottom:1px solid rgba(246,243,236,.1)}
.tab{padding:12px 18px;background:none;border:none;color:rgba(246,243,236,.6);font-size:1rem;border-bottom:2px solid transparent}
.tab.active{color:#fef8f0;border-bottom-color:#e6c200}
.tab-content{display:none}.tab-content.active{display:block}
.form-group{margin-bottom:18px}
label{display:block;margin-bottom:6px;font-weight:500;font-size:.95rem}
input,textarea,select{width:100%;padding:10px;background:rgba(246,243,236,.05);border:1px solid rgba(246,243,236,.15);border-radius:6px;color:#f5f3ec;font-family:inherit;font-size:16px}
textarea{resize:vertical;min-height:70px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.checkbox-group{display:flex;gap:18px;flex-wrap:wrap;margin-bottom:18px}
.checkbox-item{display:flex;align-items:center;gap:8px}
input[type=checkbox]{width:auto}
.file-label{display:inline-block;padding:10px 16px;background:rgba(246,243,236,.1);border:1px dashed rgba(246,243,236,.3);border-radius:6px;font-size:.9rem;cursor:pointer}
.file-input{display:none}
.file-preview{margin-top:8px;font-size:.85rem;color:rgba(246,243,236,.7)}
.btn-primary{background:#1f5e9c;border:none;color:#f5f3ec;padding:12px 22px;border-radius:6px;font-size:1rem;font-weight:600}
.btn-primary:disabled{opacity:.6;cursor:not-allowed}
.btn-danger{background:rgba(220,70,70,.25);color:#e6b8b8;border:1px solid rgba(220,70,70,.3)}
.btn-small{padding:6px 12px;font-size:.85rem}
.film-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.film-card{background:rgba(246,243,236,.05);border:1px solid rgba(246,243,236,.1);border-radius:8px;padding:14px}
.film-poster{width:100%;height:130px;background:rgba(0,0,0,.3);border-radius:6px;margin-bottom:10px;object-fit:cover}
.film-title{font-weight:600;margin-bottom:4px;font-size:.95rem}
.film-meta{font-size:.8rem;color:rgba(246,243,236,.6);margin-bottom:10px}
.film-actions{display:flex;gap:8px}
.film-actions button{flex:1}
.toast{position:fixed;bottom:20px;right:20px;background:rgba(0,0,0,.85);color:#f5f3ec;padding:12px 20px;border-radius:6px;font-size:.9rem;z-index:9999}
.toast.error{background:rgba(180,40,40,.92)}
.hint{font-size:.82rem;color:rgba(246,243,236,.5);margin-top:4px}
#login-overlay{position:fixed;inset:0;background:#0a0e12;display:flex;align-items:center;justify-content:center;z-index:999}
#login-box{width:90%;max-width:380px;background:rgba(246,243,236,.04);border:1px solid rgba(246,243,236,.1);padding:28px;border-radius:12px}
#login-box h2{margin-bottom:18px}
#login-err{color:#e6b8b8;margin-top:10px;font-size:.9rem;display:none}
</style>
</head>
<body>

<!-- ── Écran de connexion (intégré, aucune redirection) ── -->
<div id="login-overlay">
  <div id="login-box">
    <h2>COLLYWOOD — Admin</h2>
    <div class="form-group"><label>E-mail</label><input type="email" id="login-email" autocomplete="username"></div>
    <div class="form-group"><label>Mot de passe</label><input type="password" id="login-pw" autocomplete="current-password"></div>
    <button class="btn-primary" id="login-go" style="width:100%">Se connecter</button>
    <div id="login-err"></div>
  </div>
</div>

<!-- ── Panneau (caché tant que non connecté) ── -->
<div class="container" id="panel" style="display:none">
  <header>
    <h1>Gestion du catalogue</h1>
    <button class="logout-btn" id="logout-btn">Déconnexion</button>
  </header>
  <div class="tabs">
    <button class="tab active" data-tab="add-film">Ajouter un film</button>
    <button class="tab" data-tab="list-films">Mes films</button>
  </div>

  <div id="add-film" class="tab-content active">
    <form id="film-form">
      <div class="form-group"><label>Type de contenu</label><select id="film-kind"><option value="film">Film / Série (catalogue)</option><option value="clip">Clip (feed vertical)</option></select><div class="hint">Clip = vidéo courte verticale, comme TikTok</div></div>
      <div class="form-row">
        <div class="form-group"><label>Identifiant unique</label><input id="film-id" required placeholder="ex: mensonges"><div class="hint">Minuscules, sans espaces ni accents</div></div>
        <div class="form-group"><label>Titre</label><input id="film-title" required placeholder="Les mensonges"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Durée (minutes)</label><input type="number" id="film-duration" min="1" placeholder="105"></div>
        <div class="form-group"><label>Prix USD (0 = gratuit)</label><input type="number" id="film-price" min="0" step="0.01" value="0"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Langue</label><select id="film-language"></select></div>
        <div class="form-group"><label>Pays</label><select id="film-region"><option value="">— Aucun —</option></select></div>
      </div>
      <div class="form-group"><label>Synopsis</label><textarea id="film-synopsis"></textarea></div>
      <div class="form-group"><label>Genres (séparés par des virgules)</label><input id="film-genres" placeholder="Drame, Romance"></div>
      <div class="checkbox-group">
        <div class="checkbox-item"><input type="checkbox" id="film-hd"><label for="film-hd">HD</label></div>
        <div class="checkbox-item"><input type="checkbox" id="film-offline"><label for="film-offline">Offline</label></div>
        <div class="checkbox-item"><input type="checkbox" id="film-published" checked><label for="film-published">Publié</label></div>
      </div>
      <div class="form-group">
        <label>Poster (image)</label>
        <label for="film-poster" class="file-label">Choisir une image</label>
        <input type="file" id="film-poster" class="file-input" accept="image/*">
        <div id="poster-preview" class="file-preview"></div>
      </div>
      <div class="form-group">
        <label>Vidéo (MP4)</label>
        <label for="film-video" class="file-label">Choisir une vidéo</label>
        <input type="file" id="film-video" class="file-input" accept="video/mp4">
        <div id="video-preview" class="file-preview"></div>
      </div>
      <div class="form-group">
        <label>OU lien vidéo externe (Cloudflare Stream, Bunny, HLS…)</label>
        <input type="url" id="film-video-url" placeholder="https://customer-xxxx.cloudflarestream.com/…/manifest/video.m3u8">
        <div class="hint">Si rempli, ce lien est utilisé et le fichier ci-dessus est ignoré</div>
      </div>
      <button type="submit" class="btn-primary" id="submit-btn">Ajouter le film</button>
    </form>
  </div>

  <div id="list-films" class="tab-content">
    <div id="films-list" class="film-list"></div>
  </div>
</div>

<script>
var SUPA_URL='https://qckjbvivsyqbsujjbbcf.supabase.co';
var SUPA_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFja2pidml2c3lxYnN1ampiYmNmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM3NzUyMTAsImV4cCI6MjA5OTM1MTIxMH0.ZQNUWGBPvxp3IY26e23v9d0hhhaOKxqSUhOZ5ZeTCh0';
var SESSION=null;
function $(id){return document.getElementById(id)}
function toast(m,t){var e=document.createElement('div');e.className='toast'+(t==='error'?' error':'');e.textContent=m;document.body.appendChild(e);setTimeout(function(){e.remove()},3500)}

/* Session : localStorage si dispo, sinon en mémoire */
function saveSession(s){SESSION=s;try{localStorage.setItem('cw_admin',JSON.stringify(s))}catch(_){}}
function loadSession(){try{var s=JSON.parse(localStorage.getItem('cw_admin')||'null');if(s&&s.expires_at*1000>Date.now()+60000){SESSION=s;return s}}catch(_){}return null}
function clearSession(){SESSION=null;try{localStorage.removeItem('cw_admin')}catch(_){}}

/* Appel REST : gère les réponses vides (201/204) */
function api(path,opt){
  opt=opt||{};opt.headers=opt.headers||{};
  opt.headers['apikey']=SUPA_ANON;
  if(SESSION)opt.headers['Authorization']='Bearer '+SESSION.access_token;
  return fetch(SUPA_URL+path,opt).then(function(r){
    return r.text().then(function(t){
      var j=null;try{j=t?JSON.parse(t):null}catch(_){}
      if(!r.ok)throw new Error((j&&(j.message||j.error_description||j.msg))||('HTTP '+r.status));
      return j;
    });
  });
}

/* Colonnes listées explicitement : video_url n'est pas lisible
   (protection du lien vidéo mise en place dans le schéma) */
var FILM_COLS='id,kind,title,genres,synopsis,poster_url,duration_min,price_usd,language,region_tag,hd,offline_ok,published,created_at';

function uploadFile(bucket,path,file){
  return fetch(SUPA_URL+'/storage/v1/object/'+bucket+'/'+encodeURIComponent(path),{
    method:'POST',
    headers:{'Authorization':'Bearer '+SESSION.access_token,'apikey':SUPA_ANON,'Content-Type':file.type||'application/octet-stream','x-upsert':'true'},
    body:file
  }).then(function(r){
    if(!r.ok)return r.text().then(function(t){throw new Error('Upload échoué : '+t)});
    return SUPA_URL+'/storage/v1/object/public/'+bucket+'/'+encodeURIComponent(path);
  });
}


/* ── Langues et pays ── */
var LANGS=[["fr","Français"],["ln","Lingala"],["sw","Swahili"],["kg","Kikongo"],["lu","Tshiluba"],["en","Anglais"],["zh","Mandarin"],["ar","Arabe"],["pt","Portugais"],["es","Espagnol"],["de","Allemand"],["it","Italien"],["ru","Russe"],["hi","Hindi"],["ja","Japonais"],["ko","Coréen"],["tr","Turc"],["nl","Néerlandais"],["pl","Polonais"],["am","Amharique"],["ha","Haoussa"],["yo","Yoruba"],["ig","Igbo"],["zu","Zoulou"],["af","Afrikaans"],["wo","Wolof"],["rw","Kinyarwanda"],["rn","Kirundi"],["mg","Malgache"],["so","Somali"],["other","Autre"]];
var COUNTRIES=["Afghanistan","Afrique du Sud","Albanie","Algérie","Allemagne","Andorre","Angola","Arabie saoudite","Argentine","Arménie","Australie","Autriche","Azerbaïdjan","Bahamas","Bahreïn","Bangladesh","Barbade","Belgique","Belize","Bénin","Bhoutan","Biélorussie","Birmanie","Bolivie","Bosnie-Herzégovine","Botswana","Brésil","Brunei","Bulgarie","Burkina Faso","Burundi","Cambodge","Cameroun","Canada","Cap-Vert","Chili","Chine","Chypre","Colombie","Comores","Congo-Brazzaville","Corée du Nord","Corée du Sud","Costa Rica","Côte d'Ivoire","Croatie","Cuba","Danemark","Djibouti","Dominique","Égypte","Émirats arabes unis","Équateur","Érythrée","Espagne","Estonie","Eswatini","États-Unis","Éthiopie","Fidji","Finlande","France","Gabon","Gambie","Géorgie","Ghana","Grèce","Grenade","Guatemala","Guinée","Guinée équatoriale","Guinée-Bissau","Guyana","Haïti","Honduras","Hongrie","Îles Marshall","Îles Salomon","Inde","Indonésie","Irak","Iran","Irlande","Islande","Israël","Italie","Jamaïque","Japon","Jordanie","Kazakhstan","Kenya","Kirghizistan","Kiribati","Koweït","Laos","Lesotho","Lettonie","Liban","Liberia","Libye","Liechtenstein","Lituanie","Luxembourg","Macédoine du Nord","Madagascar","Malaisie","Malawi","Maldives","Mali","Malte","Maroc","Maurice","Mauritanie","Mexique","Micronésie","Moldavie","Monaco","Mongolie","Monténégro","Mozambique","Namibie","Nauru","Népal","Nicaragua","Niger","Nigeria","Norvège","Nouvelle-Zélande","Oman","Ouganda","Ouzbékistan","Pakistan","Palaos","Palestine","Panama","Papouasie-Nouvelle-Guinée","Paraguay","Pays-Bas","Pérou","Philippines","Pologne","Portugal","Qatar","RD Congo","République centrafricaine","République dominicaine","République tchèque","Roumanie","Royaume-Uni","Russie","Rwanda","Saint-Kitts-et-Nevis","Saint-Marin","Saint-Vincent-et-les-Grenadines","Sainte-Lucie","Salvador","Samoa","São Tomé-et-Principe","Sénégal","Serbie","Seychelles","Sierra Leone","Singapour","Slovaquie","Slovénie","Somalie","Soudan","Soudan du Sud","Sri Lanka","Suède","Suisse","Suriname","Syrie","Tadjikistan","Tanzanie","Tchad","Thaïlande","Timor oriental","Togo","Tonga","Trinité-et-Tobago","Tunisie","Turkménistan","Turquie","Tuvalu","Ukraine","Uruguay","Vanuatu","Vatican","Venezuela","Vietnam","Yémen","Zambie","Zimbabwe"];
(function(){
  var ls=$('film-language');
  LANGS.forEach(function(l){var o=document.createElement('option');o.value=l[0];o.textContent=l[1];ls.appendChild(o)});
  var rs=$('film-region');
  COUNTRIES.forEach(function(c){var o=document.createElement('option');o.value=c;o.textContent=c;rs.appendChild(o)});
})();

/* ── Login ── */
$('login-go').addEventListener('click',doLogin);
$('login-pw').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin()});
function doLogin(){
  var email=$('login-email').value.trim(),pw=$('login-pw').value;
  var err=$('login-err');err.style.display='none';
  if(!email||pw.length<6){err.textContent='E-mail et mot de passe (6 caractères min) requis.';err.style.display='block';return}
  $('login-go').disabled=true;$('login-go').textContent='Un instant…';
  fetch(SUPA_URL+'/auth/v1/token?grant_type=password',{
    method:'POST',headers:{'Content-Type':'application/json','apikey':SUPA_ANON},
    body:JSON.stringify({email:email,password:pw})
  }).then(function(r){return r.json().then(function(j){return{ok:r.ok,j:j}})})
  .then(function(res){
    $('login-go').disabled=false;$('login-go').textContent='Se connecter';
    if(res.ok&&res.j.access_token){
      saveSession({access_token:res.j.access_token,expires_at:res.j.expires_at||Math.floor(Date.now()/1000)+3600});
      openPanel();
    }else{
      var m=(res.j&&(res.j.error_description||res.j.msg))||'';
      err.textContent=/invalid/i.test(m)?'Identifiant ou mot de passe incorrect.':(m||'Erreur inattendue.');
      err.style.display='block';
    }
  }).catch(function(e){
    $('login-go').disabled=false;$('login-go').textContent='Se connecter';
    err.textContent='Connexion impossible — vérifiez internet. ('+e.message+')';err.style.display='block';
  });
}
function openPanel(){$('login-overlay').style.display='none';$('panel').style.display='block'}

/* ── Onglets ── */
document.querySelectorAll('.tab').forEach(function(b){
  b.addEventListener('click',function(){
    document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('active')});
    document.querySelectorAll('.tab-content').forEach(function(x){x.classList.remove('active')});
    b.classList.add('active');$(b.dataset.tab).classList.add('active');
    if(b.dataset.tab==='list-films')loadFilms();
  });
});

/* ── Aperçu fichiers ── */
$('film-poster').addEventListener('change',function(){$('poster-preview').textContent=this.files[0]?'📷 '+this.files[0].name:''});
$('film-video').addEventListener('change',function(){$('video-preview').textContent=this.files[0]?'🎬 '+this.files[0].name:''});

/* ── Ajout de film ── */
$('film-form').addEventListener('submit',function(e){
  e.preventDefault();
  var btn=$('submit-btn');btn.disabled=true;btn.textContent='Envoi en cours…';
  var id=$('film-id').value.trim().toLowerCase().replace(/\s+/g,'-');
  var posterF=$('film-poster').files[0],videoF=$('film-video').files[0];
  var extUrl=$('film-video-url').value.trim();
  var pUp=posterF?uploadFile('posters',id+'-poster.'+(posterF.name.split('.').pop()||'jpg'),posterF):Promise.resolve(null);
  var vUp=extUrl?Promise.resolve(extUrl):(videoF?uploadFile('videos',id+'-video.mp4',videoF):Promise.resolve(null));
  Promise.all([pUp,vUp]).then(function(urls){
    var film={
      id:id,kind:$('film-kind').value,title:$('film-title').value,
      genres:$('film-genres').value.split(',').map(function(g){return g.trim()}).filter(Boolean),
      synopsis:$('film-synopsis').value,
      poster_url:urls[0],video_url:urls[1],
      duration_min:parseInt($('film-duration').value)||null,
      price_usd:parseFloat($('film-price').value)||0,
      language:$('film-language').value,
      region_tag:$('film-region').value||null,
      hd:$('film-hd').checked,offline_ok:$('film-offline').checked,published:$('film-published').checked
    };
    return api('/rest/v1/films',{method:'POST',headers:{'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify(film)});
  }).then(function(){
    toast('Film ajouté ✓');
    $('film-form').reset();$('poster-preview').textContent='';$('video-preview').textContent='';
  }).catch(function(err){
    toast('Erreur : '+err.message,'error');
  }).finally(function(){btn.disabled=false;btn.textContent='Ajouter le film'});
});

/* ── Liste ── */
function loadFilms(){
  api('/rest/v1/films?select='+FILM_COLS+'&order=created_at.desc').then(function(films){
    var list=$('films-list');list.innerHTML='';
    if(!films||!films.length){list.innerHTML='<p style="color:rgba(246,243,236,.5)">Aucun film pour le moment.</p>';return}
    films.forEach(function(f){
      var card=document.createElement('div');card.className='film-card';
      var img=f.poster_url||'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22260%22 height=%22130%22%3E%3Crect width=%22260%22 height=%22130%22 fill=%22%23222%22/%3E%3C/svg%3E';
      card.innerHTML='<img class="film-poster" src="'+img+'" alt=""><div class="film-title"></div>'+
        '<div class="film-meta">'+(f.kind==='clip'?'🎞 Clip • ':'')+f.language+' • '+(f.duration_min||'?')+' min<br>'+(f.price_usd>0?'$'+f.price_usd:'Gratuit')+' • '+(f.published?'✓ Publié':'Brouillon')+'</div>'+
        '<div class="film-actions"><button class="btn-primary btn-danger btn-small" data-del="'+f.id+'">Supprimer</button></div>';
      card.querySelector('.film-title').textContent=f.title;
      list.appendChild(card);
    });
  }).catch(function(e){toast('Erreur : '+e.message,'error')});
}
$('films-list').addEventListener('click',function(e){
  var b=e.target.closest('[data-del]');if(!b)return;
  var id=b.getAttribute('data-del');
  if(!confirm('Supprimer « '+id+' » ?'))return;
  api('/rest/v1/films?id=eq.'+encodeURIComponent(id),{method:'DELETE'})
    .then(function(){toast('Supprimé');loadFilms()})
    .catch(function(e2){toast('Erreur : '+e2.message,'error')});
});

/* ── Déconnexion / Boot ── */
$('logout-btn').addEventListener('click',function(){clearSession();location.reload()});
if(loadSession())openPanel();
</script>
</body>
</html>
